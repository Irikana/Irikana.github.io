<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>知识馆 - 可回忆知识</title>
  <meta name="description" content="牧羊人图书馆 - 存放所有知识之地">
  <meta name="keywords" content="图书馆,知识,学习,牧羊人">
  <meta name="theme-color" content="#2c3e50">
  <meta name="referrer" content="origin-when-cross-origin">
  <meta property="og:title" content="知识馆 - 可回忆知识">
  <meta property="og:description" content="可回忆知识是建筑最稳定的知识">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_CN">
  <link rel="preload" href="../../css/style.css" as="style">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .kh-body { display: flex; min-height: 100vh; }
    .kh-sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 220px; background: #fafafa;
      border-right: 1px solid #e0e0e0;
      padding: 24px 16px;
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .kh-main { margin-left: 220px; flex: 1; padding: 40px 48px; max-width: 900px; }
    .kh-logo-area { text-align: center; margin-bottom: 32px; }
    .kh-logo-area img { max-width: 80px; display: block; margin: 0 auto; }
    .kh-site-title { font-size: 14px; font-weight: 700; color: #2c3e50; letter-spacing: 1px; text-align: center; margin-top: 8px; }
    .kh-equality { font-size: 10px; color: #999; text-align: center; margin-top: 6px; letter-spacing: 0.5px; }
    .kh-nav-item {
      display: block; padding: 10px 12px; color: #555;
      text-decoration: none; border-radius: 4px; margin: 2px 0;
      font-size: 14px; transition: all 0.15s;
    }
    .kh-nav-item:hover { background: #f0f0f0; color: #2c3e50; }
    .kh-nav-divider { height: 1px; background: #e0e0e0; margin: 12px 0; }
    .kh-nav-section { font-size: 10px; color: #aaa; font-weight: 600; letter-spacing: 1px; margin: 16px 0 8px; padding: 0 12px; }
    .kh-content h2 { font-size: 24px; font-weight: 700; color: #1a1a1a; margin: 48px 0 24px; padding-bottom: 12px; border-bottom: 2px solid #2c3e50; }
    .kh-content h2:first-child { margin-top: 0; }
    .kh-content h3 { font-size: 18px; font-weight: 600; color: #333; margin: 32px 0 16px; }
    .kh-content p { font-size: 17px; line-height: 1.9; color: #444; margin: 16px 0; }
    .kh-card { background: transparent; border: 1px solid #e0e0e0; border-radius: 4px; padding: 24px; margin: 20px 0; }

    .kh-card-title-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .kh-card-title-link h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
      font-weight: 600;
      transition: color 0.15s;
    }
    .kh-card-title-link:hover h3 {
      color: #2c3e50;
    }
    .kh-footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid #e0e0e0;
      text-align: center;
      font-size: 12px;
      color: #888;
      line-height: 1.9;
    }
    .kh-footer p { margin: 4px 0; }

    @media (max-width: 768px) {
      .kh-sidebar { position: static; width: 100%; border-right: none; border-bottom: 1px solid #e0e0e0; padding: 16px; }
      .kh-body { flex-direction: column; }
      .kh-main { margin-left: 0; padding: 24px 16px; }
      .kh-content h2 { font-size: 20px; margin-top: 32px; }
      .kh-content p { font-size: 16px; }
    }

    @media (prefers-color-scheme: dark) {
      body.kh-body { background: #1a1a1a; color: #e8e6e3; }
      .kh-sidebar { background: #222; border-right-color: #333; }
      .kh-site-title { color: #e8e6e3; }
      .kh-equality { color: #888; }
      .kh-nav-item { color: #e8e6e3; }
      .kh-nav-item:hover { background: #333; color: #fff; }
      .kh-nav-divider { background: #333; }
      .kh-nav-section { color: #666; }
      .kh-content h2 { color: #e8e6e3; border-bottom-color: #444; }
      .kh-content h3 { color: #c0bdb8; }
      .kh-content p { color: #a0a0a0; }
      .kh-card { background: transparent; border-color: #333; }
      .kh-card-title-link:hover h3 {
        color: #5d9ccc;
      }
      .link-to-page { background: #2c3e50; color: #fff; }
      .link-to-page:hover { background: #3d526b; }
      .kh-footer { border-top-color: #333; color: #666; }
    }

    .force-dark-mode body.kh-body,
    .force-dark-mode.kh-body { background: #1a1a1a; color: #e8e6e3; }
    .force-dark-mode .kh-sidebar { background: #222; border-right-color: #333; }
    .force-dark-mode .kh-site-title { color: #e8e6e3; }
    .force-dark-mode .kh-equality { color: #888; }
    .force-dark-mode .kh-nav-item { color: #e8e6e3; }
    .force-dark-mode .kh-nav-item:hover { background: #333; color: #fff; }
    .force-dark-mode .kh-nav-divider { background: #333; }
    .force-dark-mode .kh-nav-section { color: #666; }
    .force-dark-mode .kh-content h2 { color: #e8e6e3; border-bottom-color: #444; }
    .force-dark-mode .kh-content h3 { color: #c0bdb8; }
    .force-dark-mode .kh-content p { color: #a0a0a0; }
    .force-dark-mode .kh-card { background: transparent; border-color: #333; }
    .force-dark-mode .kh-card-title-link:hover h3 {
      color: #5d9ccc;
    }
    .force-dark-mode .link-to-page { background: #2c3e50; color: #fff; }
    .force-dark-mode .link-to-page:hover { background: #3d526b; }
    .force-dark-mode .kh-footer { border-top-color: #333; color: #666; }

    .force-light-mode body.kh-body,
    .force-light-mode.kh-body { background: #fff; color: #1a1a1a; }
    .force-light-mode .kh-sidebar { background: #fafafa; border-right-color: #e0e0e0; }
    .force-light-mode .kh-site-title { color: #2c3e50; }
    .force-light-mode .kh-equality { color: #999; }
    .force-light-mode .kh-nav-item { color: #1a1a1a; }
    .force-light-mode .kh-nav-item:hover { background: #f0f0f0; color: #2c3e50; }
    .force-light-mode .kh-nav-divider { background: #e0e0e0; }
    .force-light-mode .kh-nav-section { color: #aaa; }
    .force-light-mode .kh-content h2 { color: #1a1a1a; border-bottom-color: #2c3e50; }
    .force-light-mode .kh-content h3 { color: #333; }
    .force-light-mode .kh-content p { color: #444; }
    .force-light-mode .kh-card { background: transparent; border-color: #e0e0e0; }
    .force-light-mode .kh-card-title-link:hover h3 { color: #5d9ccc; }
    .force-light-mode .link-to-page { background: #2c3e50; color: #fff; }
    .force-light-mode .link-to-page:hover { background: #3d526b; }
    .force-light-mode .kh-footer { border-top-color: #e0e0e0; color: #888; }
  </style>
</head>
